name: CI
# ▲ The loop gates on a workflow whose `name:` matches CI_WORKFLOW (.harness/harness.env, default "CI").

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Definition of Done
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # ESLint is not set up in this repo yet (`next lint` is interactive). Once it's configured to
      # run headless, add a `Lint` step here AND `npm run lint &&` to LOCAL_DOD in harness.env.
      - name: Build
        run: npm run build
